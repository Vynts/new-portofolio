name: Deploy Next.js to GitHub Pages

on:
  push:
    branches:
      - main # Jalankan deploy setiap kali push ke branch main

# Mengizinkan GitHub Actions untuk men-deploy ke Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Menghindari duplikasi build yang berjalan bersamaan
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20" # Menyesuaikan dengan versi Node LTS saat ini
          cache: ${{ steps.detect-package-manager.outputs.manager }}

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          # Next.js secara otomatis akan mendeteksi static export
          static_site_generator: next

      - name: Install dependencies
        run: npm ci # atau 'npm install' jika kamu tidak menggunakan package-lock.json

      - name: Build static site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out # Hasil static export dari Next.js berada di folder 'out'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4